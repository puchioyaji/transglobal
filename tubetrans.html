<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻訳モニター</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background: #000000; 
            color: #ffffff; 
            margin: 0; 
            padding: 10px; 
            box-sizing: border-box;
        }
        .container { 
            max-width: 100%; 
            width: 100%; 
        }
        /* コントロールエリア（スリム化） */
        .control-panel { 
            background: #111111; 
            padding: 10px; 
            border-radius: 6px; 
            margin-bottom: 10px; 
            border: 1px solid #222222;
        }
        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
        }
        .row:last-child { margin-bottom: 0; }
        select { 
            flex: 1; 
            padding: 8px; 
            background: #222222; 
            color: #ffffff; 
            border: 1px solid #444444; 
            font-size: 14px; 
            border-radius: 4px; 
        }
        button { 
            width: 100%; 
            padding: 10px; 
            font-weight: bold; 
            font-size: 16px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
        }
        #start-btn { background: #ff0000; color: white; }
        #stop-btn { background: #444444; color: white; display: none; }
        
        /* 🌟 文字視認性を最優先した字幕エリア */
        #subtitle-area { 
            margin-top: 10px; 
            padding: 20px; 
            background: #0a0a0a; 
            border-left: 6px solid #ff0000; 
            border-radius: 4px; 
            min-height: 200px;
        }
        .sub-translated { 
            font-size: 38px; /* 巨大文字で圧倒的に見やすく */
            font-weight: bold; 
            color: #ffaa00; /* 視認性の高いオレンジゴールド */
            line-height: 1.5; 
            margin-bottom: 15px; 
            word-break: break-all;
        }
        .sub-original { 
            font-size: 22px; /* 原文も認識確認しやすいサイズに */
            color: #888888; 
            line-height: 1.4;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="control-panel">
        <div class="row">
            <select id="source-lang">
                <option value="ja-JP">元: 日本語</option>
                <option value="en-US">元: 英語</option>
            </select>
            <select id="target-lang">
                <option value="vi-VN">先: ベトナム語</option>
                <option value="ja-JP">先: 日本語</option>
                <option value="en-US">先: 英語</option>
            </select>
        </div>
        <button id="start-btn" onclick="startApp()">翻訳を開始する</button>
        <button id="stop-btn" onclick="stopApp()">停止</button>
    </div>

    <!-- 字幕表示 -->
    <div id="subtitle-area">
        <div id="translated-text" class="sub-translated">（ここに翻訳が表示されます）</div>
        <div id="original-text" class="sub-original">（ここに元の日本語が表示されます）</div>
    </div>
</div>

<script>
    let recognition;
    let isListening = false;
    let micStream = null;
    let speechQueue = [];
    let isSpeaking = false;

    // 前回の設定通り、YAMAHA仮想デバイスを自動で狙い撃ちするための高音質設定
    async function startApp() {
        try {
            micStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
            });
            document.getElementById("start-btn").style.display = "none";
            document.getElementById("stop-btn").style.display = "block";
            initSpeechRecognition();
        } catch (e) {
            alert("デバイスの接続に失敗しました。Chromeの設定でマイク(YAMAHA)が許可されているか確認してください。");
        }
    }

    function initSpeechRecognition() {
        const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
        if (!SpeechRecognition) return alert("お使いのブラウザは音声認識に対応していません。");

        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true; // 12文字での細かい並列区切りのために有効化
        
        const sourceLang = document.getElementById("source-lang").value;
        const targetLang = document.getElementById("target-lang").value;
        recognition.lang = sourceLang;

        let lastProcessedLength = 0;
        isListening = true;

        document.getElementById("translated-text").innerText = "音声待機中...";
        document.getElementById("original-text").innerText = "";

        recognition.onresult = async (event) => {
            let fullTranscript = "";
            let finalTranscript = "";

            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript;
                } else {
                    fullTranscript += event.results[i][0].transcript;
                }
            }

            let currentText = finalTranscript || fullTranscript;
            let untranslatedText = currentText.substring(lastProcessedLength).trim();

            if (untranslatedText.length > 0) {
                // 短いセンテンス（12文字以上）または句読点で並列処理へ送り出す
                if (untranslatedText.length >= 12 || untranslatedText.includes("、") || untranslatedText.includes("。")) {
                    lastProcessedLength = currentText.length;
                    
                    // 翻訳API呼び出し
                    const src = sourceLang.split('-')[0];
                    const tgt = targetLang.split('-')[0];
                    
                    document.getElementById("original-text").innerText = untranslatedText;
                    
                    try {
                        const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(untranslatedText)}&langpair=${src}|${tgt}`);
                        const data = await res.json();
                        let translated = data.responseData.translatedText;
                        
                        // 画面反映と発話
                        document.getElementById("translated-text").innerText = translated;
                        queueSpeech(translated, targetLang);
                    } catch (err) {
                        console.error(err);
                    }
                }
            }
        };

        recognition.onend = () => {
            if (isListening) {
                lastProcessedLength = 0;
                try { recognition.start(); } catch(e) {}
            }
        };
        recognition.start();
    }

    function queueSpeech(text, langCode) {
        speechQueue.push({ text: text, lang: langCode });
        processSpeechQueue();
    }

    function processSpeechQueue() {
        if (isSpeaking || speechQueue.length === 0) return;
        isSpeaking = true;
        const current = speechQueue.shift();
        const utterance = new SpeechSynthesisUtterance(current.text);
        utterance.lang = current.lang;
        utterance.onend = () => { isSpeaking = false; processSpeechQueue(); };
        utterance.onerror = () => { isSpeaking = false; processSpeechQueue(); };
        window.speechSynthesis.speak(utterance);
    }

    function stopApp() {
        isListening = false;
        if (micStream) micStream.getTracks().forEach(track => track.stop());
        if (recognition) recognition.stop();
        speechQueue = [];
        window.speechSynthesis.cancel();
        document.getElementById("start-btn").style.display = "block";
        document.getElementById("stop-btn").style.display = "none";
        document.getElementById("translated-text").innerText = "停止しました。";
    }
</script>
</body>
</html>
